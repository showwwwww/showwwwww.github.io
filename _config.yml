# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: show's tech blog
description: >- # this means to ignore newlines until "baseurl:"
  Notes, experiments, and write-ups on software, systems, and the web by
  show — covering frontend, React internals, testing, and developer tools.
# The home hero copy (welcome title + subtitle) lives in `_data/i18n.yml`
# under `us.home.welcome_title` / `us.home.welcome_subtitle` (and the `cn`
# branch) so it follows the language toggle. See
# `docs/product-specs/internationalization.md`.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://showwwwww.github.io" # the base hostname & protocol for your site, used by jekyll-seo-tag and jekyll-sitemap.
lang: en-US # default site lang for jekyll-seo-tag; per-page lang is set by `_config.yml` defaults below.
twitter_username: jekyllrb
github_username:  showwwwww

# SEO / GEO author identity. Consumed by `jekyll-seo-tag` to produce
# JSON-LD `Person` and `BlogPosting` schema, and by the OG `article:author`
# meta tag. See `docs/product-specs/seo.md` for the full contract.
author:
  name: show
  url: https://github.com/showwwwww

social:
  name: show
  links:
    - https://github.com/showwwwww
    - https://www.linkedin.com/in/showwwwww11/

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Use our custom layouts in this repo (override Minima)

# Per-language defaults for posts. `lang` is our internal toggle key
# (`us` / `cn`); `locale` is the BCP-47-shaped value consumed by
# jekyll-seo-tag for `og:locale`. See
# docs/product-specs/internationalization.md and
# docs/product-specs/seo.md for the full contract.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      lang: us
      locale: en_US
      permalink: /:title/
  - scope:
      path: "_posts/cn"
      type: posts
    values:
      lang: cn
      locale: zh_CN
      permalink: /cn/:title/

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - docs/
  - scripts/
  - AGENTS.md
  - ARCHITECTURE.md
  - CLAUDE.md
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
